name: task1
description: "Telehealth Doctor App - RehaUnified Assignment"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # WebRTC
  flutter_webrtc: ^0.12.7

  # Local storage for session notes
  shared_preferences: ^2.3.3

  # UUID generation for room IDs
  uuid: ^4.5.1

  # Intl for date formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
